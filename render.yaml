# render.yaml — Render 零配置部署
# 详见：https://render.com/docs/deploy-uvicorn-fastapi-python

services:
  - type: web
    name: watermark-parser-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.11"
